<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>LifeHub ⚡</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

/* ── LIGHT (default) ── */
:root{
  --bg:#F4F6F9;--bg2:#FFFFFF;--bg3:#F0F2F5;--bg4:#E8ECF2;
  --border:#E4E8EF;--border2:#CDD3DE;
  --text:#0D1B2A;--text2:#3D5166;--muted:#7A8FA6;--subtle:#B0BEC8;
  --primary:#0F3460;--primary2:#16498A;--primaryLight:#EBF3FB;
  --accent:#1A6FAB;--accentBg:rgba(26,111,171,.08);
  --green:#059669;--greenBg:#D1FAE5;--greenText:#065F46;
  --amber:#D97706;--amberBg:#FEF3C7;--amberText:#92400E;
  --red:#DC2626;--redBg:#FEE2E2;--redText:#991B1B;
  --purple:#7C3AED;--purpleBg:#F5F3FF;--purpleText:#4C1D95;
  --gold:#B45309;--goldBg:#FEF9C3;--goldText:#713F12;
  --shadow:0 1px 6px rgba(13,27,42,.07);
  --shadow-md:0 4px 16px rgba(13,27,42,.10);
  --radius:16px;--radius-sm:12px;--radius-xs:8px;
  /* legacy aliases used in JS templates */
  --cyan:#1A6FAB;--cyanBg:rgba(26,111,171,.08);
  --purple-v:#7C3AED;--purpleBg-v:rgba(124,58,237,.08);
  --pink:#DB2777;--pinkBg:rgba(219,39,119,.08);
  --amber-v:#D97706;--amberBg-v:rgba(217,119,6,.08);
  --red-v:#DC2626;--redBg-v:rgba(220,38,38,.08);
  --green-v:#059669;--greenBg-v:rgba(5,150,105,.08);
  --gold916:#B45309;
}

/* ── DARK ── */
body.dark{
  --bg:#0D1B2A;--bg2:#132336;--bg3:#1A2E42;--bg4:#213550;
  --border:#243A52;--border2:#2E4A64;
  --text:#EDF2F7;--text2:#A0B8CC;--muted:#5A7A96;--subtle:#3A5870;
  --primary:#2980B9;--primary2:#3498DB;--primaryLight:rgba(41,128,185,.15);
  --accent:#3498DB;--accentBg:rgba(52,152,219,.12);
  --green:#10B981;--greenBg:rgba(16,185,129,.15);--greenText:#6EE7B7;
  --amber:#F59E0B;--amberBg:rgba(245,158,11,.15);--amberText:#FCD34D;
  --red:#F87171;--redBg:rgba(248,113,113,.15);--redText:#FCA5A5;
  --purple:#A78BFA;--purpleBg:rgba(167,139,250,.12);--purpleText:#DDD6FE;
  --gold:#FBBF24;--goldBg:rgba(251,191,36,.12);--goldText:#FDE68A;
  --shadow:0 1px 6px rgba(0,0,0,.25);
  --shadow-md:0 4px 16px rgba(0,0,0,.35);
  --cyan:#3498DB;--cyanBg:rgba(52,152,219,.12);
  --purple-v:#A78BFA;--purpleBg-v:rgba(167,139,250,.12);
  --pink:#F472B6;--pinkBg:rgba(244,114,182,.12);
  --amber-v:#F59E0B;--amberBg-v:rgba(245,158,11,.12);
  --red-v:#F87171;--redBg-v:rgba(248,113,113,.12);
  --green-v:#10B981;--greenBg-v:rgba(16,185,129,.12);
  --gold916:#FBBF24;
}

body{
  font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;font-size:13px;line-height:1.5;
  transition:background .25s,color .25s;
}
#app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:76px}

/* ── HEADER ── */
#hdr{
  background:var(--primary);
  padding:12px 16px 0;
  position:sticky;top:0;z-index:100;
}
.hdr-brand{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.4px}
.hdr-brand span{color:rgba(168,216,234,.7);font-weight:400}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:.3px;margin-top:1px}

/* ── HERO (on header bg) ── */
.hero-section{
  background:linear-gradient(160deg,var(--primary) 0%,var(--primary2) 100%);
  padding:16px 16px 0;
}
.hero-greeting{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:10px;font-weight:500}
.hero-greeting strong{color:rgba(255,255,255,.9);font-weight:600}
.hero-nw-row{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.hero-nw-lbl{font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.eye-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.4);font-size:14px;padding:0;line-height:1;transition:color .15s}
.eye-btn:hover{color:rgba(255,255,255,.8)}
.hero-nw-val{font-size:28px;font-weight:800;color:#fff;letter-spacing:-.8px;line-height:1.1;transition:filter .25s}
.hero-nw-val.blurred{filter:blur(10px);user-select:none}
.hero-nw-trend{font-size:10px;color:rgba(255,255,255,.4);margin-top:3px;margin-bottom:14px}
.hero-stats{display:flex;padding:12px 0;border-top:1px solid rgba(255,255,255,.1)}
.hero-stat{flex:1;text-align:center}
.hero-stat+.hero-stat{border-left:1px solid rgba(255,255,255,.08)}
.hs-lbl{font-size:9px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:3px}
.hs-val{font-size:12px;font-weight:700;color:#fff;transition:filter .25s}
.hs-val.red{color:#FCA5A5}
.hs-val.grn{color:#6EE7B7}
.hs-val.blurred{filter:blur(6px)}

/* ── WAVE ── */
.hero-wave{height:20px;background:var(--bg);border-radius:20px 20px 0 0;margin-top:-1px}

/* ── BOTTOM NAV ── */
#nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:var(--bg2);border-top:1px solid var(--border);
  display:flex;padding:6px 8px 10px;gap:4px;z-index:200;
}
.nb{
  flex:1;border:none;background:none;cursor:pointer;
  padding:6px 4px 4px;display:flex;flex-direction:column;
  align-items:center;gap:3px;border-radius:10px;
  font-family:'Inter',sans-serif;transition:background .15s;
}
.nb.active-nb{background:var(--primaryLight)}
.ni{font-size:17px;line-height:1}
.nl{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:.3px;text-transform:uppercase}
.nl.on{color:var(--primary)}
.ndot{width:4px;height:4px;border-radius:50%;background:var(--primary)}

/* ── SUB NAV ── */
#subnav-container{position:sticky;top:49px;z-index:90;background:var(--bg2);border-bottom:1px solid var(--border)}
.subnav{display:flex;gap:6px;padding:8px 13px;overflow-x:auto;scrollbar-width:none}
.subnav::-webkit-scrollbar{display:none}
.snb{
  flex:0 0 auto;border:none;
  background:var(--bg3);border-radius:20px;
  cursor:pointer;padding:5px 13px;
  font-size:11px;font-weight:600;color:var(--muted);
  font-family:'Inter',sans-serif;white-space:nowrap;
  transition:all .15s;
}
.snb.on{background:var(--primary);color:#fff}

/* ── QUICK ACTIONS ── */
.qa-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;padding:10px 13px 0}
.qa-btn{background:var(--bg2);border:none;border-radius:12px;padding:10px 4px 8px;cursor:pointer;text-align:center;box-shadow:var(--shadow)}
.qa-ico{font-size:18px;margin-bottom:3px}
.qa-lbl{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.2px}

/* ── SECTION ── */
.sec{padding:10px 13px 0}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sec-title{font-size:14px;font-weight:700;color:var(--text)}
.sec-link{font-size:11px;color:var(--primary);font-weight:600;background:none;border:none;cursor:pointer}

/* ── CARDS ── */
.card{background:var(--bg2);border-radius:var(--radius);padding:14px;margin-bottom:9px;box-shadow:var(--shadow)}
.card-glow{background:var(--bg2);border-radius:var(--radius);padding:14px;margin-bottom:9px;box-shadow:var(--shadow);border-left:3px solid var(--primary)}
.card-flat{background:var(--bg3);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:7px}

/* ── TYPOGRAPHY ── */
.lbl{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.7px}
.mono{font-family:'Inter',sans-serif;font-weight:700}
.t-xl{font-size:20px;font-weight:700}
.t-lg{font-size:16px;font-weight:700}
.t-md{font-size:13px;font-weight:600}
.t-sm{font-size:12px}
.t-xs{font-size:10px}
.c-c{color:var(--primary)}.c-p{color:var(--purple)}.c-g{color:var(--green)}
.c-a{color:var(--amber)}.c-r{color:var(--red)}.c-m{color:var(--muted)}
.c-gold{color:var(--gold)}.c-pk{color:var(--pink)}
.fw7{font-weight:700}.fw6{font-weight:600}.fw5{font-weight:500}
.op7{opacity:.6}.strike{text-decoration:line-through;opacity:.4}.italic{font-style:italic}

/* ── BUTTONS ── */
.btn{border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;border-radius:var(--radius-xs);padding:8px 13px;font-size:12px;transition:opacity .15s}
.btn:active{opacity:.75}
.btn-ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:var(--redBg);color:var(--red)}
.btn-add{background:var(--primary);color:#fff;border:none;border-radius:20px;padding:6px 14px;cursor:pointer;font-weight:600;font-size:12px;font-family:'Inter',sans-serif}
.btn-primary{background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);padding:12px;font-weight:600;font-size:14px;cursor:pointer;width:100%;font-family:'Inter',sans-serif}
.flex1{flex:1}

/* ── CHIPS ── */
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.3px}
.cc{background:var(--accentBg);color:var(--accent)}
.cp{background:var(--purpleBg);color:var(--purple)}
.cg{background:var(--greenBg);color:var(--greenText)}
.ca{background:var(--amberBg);color:var(--amberText)}
.cr{background:var(--redBg);color:var(--redText)}
.cgold{background:var(--goldBg);color:var(--goldText)}
.cpk{background:var(--pinkBg);color:var(--pink)}

/* ── STATUS BADGES (larger) ── */
.badge-paid{background:#D1FAE5;color:#065F46;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700}
.badge-pending{background:#EFF6FF;color:#1E40AF;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700}
.badge-partial{background:#F5F3FF;color:#5B21B6;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700}
.badge-overdue{background:#FEE2E2;color:#991B1B;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700}
body.dark .badge-paid{background:rgba(16,185,129,.2);color:#6EE7B7}
body.dark .badge-pending{background:rgba(52,152,219,.2);color:#93C5FD}
body.dark .badge-partial{background:rgba(167,139,250,.2);color:#DDD6FE}
body.dark .badge-overdue{background:rgba(248,113,113,.2);color:#FCA5A5}

/* ── TRANSACTION / BILL ROWS ── */
.t-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.t-row:last-child{border-bottom:none}
.t-dot{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.t-info{flex:1}
.t-name{font-size:12px;font-weight:600;color:var(--text)}
.t-meta{font-size:10px;color:var(--muted);margin-top:1px}
.t-right{text-align:right}
.t-amt{font-size:12px;font-weight:700;color:var(--text)}

/* ── ALERT BANNERS ── */
.alert-banner{background:var(--redBg);border-left:3px solid var(--red);border-radius:var(--radius-xs);padding:9px 12px;margin-bottom:8px;display:flex;gap:8px;align-items:center}
.alert-amber{background:var(--amberBg);border-left:3px solid var(--amber);border-radius:var(--radius-xs);padding:9px 12px;margin-bottom:8px;display:flex;gap:8px;align-items:center}

/* ── HUB CARDS ── */
.hub-card{background:var(--bg2);border-radius:var(--radius);padding:14px;margin-bottom:9px;cursor:pointer;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s}
.hub-card:active{transform:scale(.98)}
.hub-icon{font-size:20px;margin-bottom:6px}
.hub-title{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.hub-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.hub-label{font-size:11px;color:var(--muted)}
.hub-val{font-size:12px;font-weight:700;color:var(--text)}

/* ── PROGRESS BARS ── */
.bar-bg{border-radius:99px;background:var(--bg4);overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .5s ease}

/* ── FORMS ── */
.fg{margin-bottom:10px}
.flbl{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:4px}
.finp{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--radius-xs);padding:9px 12px;font-size:13px;color:var(--text);box-sizing:border-box;outline:none;font-family:'Inter',sans-serif;-webkit-appearance:none;transition:border-color .15s}
.finp:focus{border-color:var(--primary)}
.fsel{position:relative}
.fsa{position:absolute;right:12px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--primary);font-size:10px}

/* ── MODAL ── */
.mov{position:fixed;inset:0;background:rgba(13,27,42,.6);z-index:500;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.mbox{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;max-width:430px;max-height:92vh;overflow-y:auto;padding:20px 16px 44px;box-shadow:var(--shadow-md)}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mtitle{font-size:14px;font-weight:700;color:var(--primary)}
.mclose{background:var(--bg3);border:none;border-radius:99px;width:28px;height:28px;cursor:pointer;font-size:13px;color:var(--muted)}

/* ── LAYOUT ── */
.row{display:flex;justify-content:space-between;align-items:center}
.flex{display:flex;align-items:center}
.g4{gap:4px}.g6{gap:6px}.g8{gap:8px}.g10{gap:10px}
.wrap{flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.tar{text-align:right}.tac{text-align:center}
.mb4{margin-bottom:4px}.mb6{margin-bottom:6px}.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}
.mt4{margin-top:4px}.mt6{margin-top:6px}.mt8{margin-top:8px}.mt10{margin-top:10px}
.div{border-bottom:1px solid var(--border);margin-bottom:8px;padding-bottom:8px}
.info-box{background:var(--bg3);border-radius:8px;padding:6px 11px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}

/* ── FILTER / SORT ── */
.srow{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;scrollbar-width:none}
.srow::-webkit-scrollbar{display:none}
.frow{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.fbtn{padding:4px 12px;border-radius:20px;border:1.5px solid var(--border);cursor:pointer;font-size:11px;font-weight:600;background:var(--bg2);color:var(--muted);font-family:'Inter',sans-serif;transition:all .15s}
.fbtn.on{background:var(--primaryLight);color:var(--primary);border-color:var(--primary)}
.sbtn{white-space:nowrap;padding:4px 12px;border-radius:20px;border:1.5px solid var(--border);cursor:pointer;font-size:11px;font-weight:600;background:var(--bg2);color:var(--muted);font-family:'Inter',sans-serif}
.sbtn.on{background:var(--primaryLight);color:var(--primary);border-color:var(--primary)}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:36px 20px}
.empty-icon{font-size:38px;margin-bottom:10px;opacity:.3}
.empty-title{font-weight:600;color:var(--muted);font-size:14px;margin-bottom:4px}
.empty-sub{color:var(--subtle);font-size:12px}

/* ── QSTAT ── */
.qstat{background:var(--bg2);border-radius:var(--radius-sm);padding:10px;text-align:center;box-shadow:var(--shadow);cursor:pointer}
.qstat-val{font-size:13px;font-weight:700}
.qstat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* ── GOLD ── */
.gold-card{background:var(--bg2);border-radius:var(--radius);padding:14px;margin-bottom:9px;box-shadow:var(--shadow);border-left:3px solid var(--gold)}
.goal-ring{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.goal-dot{width:20px;height:20px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:10px}
.goal-dot.filled{background:var(--goldBg);border:1.5px solid var(--gold)}
.pnl-pos{color:var(--green)}.pnl-neg{color:var(--red)}

/* ── CC CARD ── */
.cc-hero{background:linear-gradient(135deg,var(--primary) 0%,var(--primary2) 100%);border-radius:14px;padding:14px;color:#fff;margin-bottom:0}
body.dark .cc-hero{background:linear-gradient(135deg,#1A3A5C 0%,#1F4E79 100%)}
.util-low{color:var(--green)}.util-med{color:var(--amber)}.util-high{color:var(--red)}

/* ── HABIT DOTS ── */
.ebadge{display:inline-block;padding:2px 7px;border-radius:6px;font-size:9px;font-weight:600;letter-spacing:.3px}
.e-deep{background:var(--purpleBg);color:var(--purple)}
.e-quick{background:var(--greenBg);color:var(--green)}
.e-admin{background:var(--amberBg);color:var(--amber)}
.e-call{background:var(--accentBg);color:var(--accent)}

/* ── SCORE ── */
.score-num{font-size:36px;font-weight:800;color:var(--primary);line-height:1}

/* ── BLUR (eye toggle) ── */
.blurred{filter:blur(8px)!important;user-select:none}
.blurred-sm{filter:blur(5px)!important;user-select:none}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="row" style="padding-bottom:0">
      <div>
        <div class="hdr-brand">Life<span>Hub</span></div>
        <div class="hdr-sub" id="hdr-date"></div>
      </div>
      <div class="flex g8">
        <button onclick="toggleTheme()" id="theme-btn" style="background:rgba(255,255,255,.12);border:none;border-radius:99px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px" title="Toggle theme">🌙</button>
        <button onclick="openSettings()" style="background:rgba(255,255,255,.12);border:none;border-radius:99px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px">⚙️</button>
        <div onclick="openSettings()" style="width:30px;height:30px;border-radius:50%;background:rgba(168,216,234,.3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;cursor:pointer" id="avatar-lbl">M</div>
      </div>
    </div>
  </div>
  <div id="hero-container"></div>
  <div id="subnav-container"></div>
  <div id="page"></div>
  <nav id="nav"></nav>
</div>

<div id="modal" class="mov" style="display:none" onclick="closeModal()">
  <div class="mbox" onclick="event.stopPropagation()">
    <div class="mhdr"><span class="mtitle" id="m-title"></span><button class="mclose" onclick="closeModal()">✕</button></div>
    <div id="m-body"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
const LS={get:(k,fb)=>{try{const v=localStorage.getItem('lhv2_'+k);return v?JSON.parse(v):fb}catch{return fb}},set:(k,v)=>{try{localStorage.setItem('lhv2_'+k,JSON.stringify(v))}catch{}}};
const uid=()=>Math.random().toString(36).slice(2,9);
const fmtRM=n=>'RM '+Number(n||0).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDt=d=>d?new Date(d).toLocaleDateString('en-MY',{day:'2-digit',month:'short',year:'numeric'}):'-';
const todayStr=()=>new Date().toISOString().slice(0,10);
const isOver=d=>d&&new Date(d)<new Date(todayStr());

function goldPort(){
  let t916=0,t999=0,cost=0,val=0;
  S.gold.forEach(g=>{
    const gr=Number(g.grams||0);
    const curP=g.purity==='999'?S.goldPrices.p999:S.goldPrices.p916;
    if(g.purity==='999')t999+=gr;else t916+=gr;
    cost+=Number(g.buyPricePerG||0)*gr;val+=curP*gr;
  });
  return{t916,t999,cost,val,pnl:val-cost};
}

function totMonthlyCommits(){
  return S.commits.reduce((s,c)=>{const m=FREQ_M[c.freq];if(!m)return s;return s+Number(c.actualAmount||c.estAmount||0)/m;},0);
}

function commitDue(c){
  if(!c.dueDay)return'';
  const n=new Date();
  return new Date(n.getFullYear(),n.getMonth(),c.dueDay).toISOString().slice(0,10);
}

function monthlyEquiv(c){
  const m=FREQ_M[c.freq];if(!m||m===1)return null;
  return Number(c.estAmount||0)/m;
}

function cardDueDate(card){
  if(!card.dueDay)return'';
  const n=new Date();
  let d=new Date(n.getFullYear(),n.getMonth(),card.dueDay);
  if(d<new Date(todayStr()))d=new Date(n.getFullYear(),n.getMonth()+1,card.dueDay);
  return d.toISOString().slice(0,10);
}

function instMonthsLeft(i){
  if(!i.startDate||!i.months)return null;
  const end=new Date(new Date(i.startDate).getFullYear(),new Date(i.startDate).getMonth()+Number(i.months),1);
  return Math.max(0,Math.ceil((end-new Date())/(86400000*30)));
}

function totalCCMonthly(){
  return S.installments.filter(i=>i.status==='Active').reduce((s,i)=>s+Number(i.monthly||0),0);
}

function calcNetWorth(){
  const gp=goldPort();
  const totS=S.saves.reduce((s,v)=>s+Number(v.current||0),0);
  const propVal=(S.properties||[]).reduce((s,p)=>s+Number(p.currentValue||0),0);
  const assetVal=(S.assets||[]).reduce((s,a)=>s+Number(a.value||0),0);
  const loanDebt=S.debts.reduce((s,d)=>s+Number(d.remaining||0),0);
  const ccDebt=S.cards.reduce((s,c)=>s+Number(c.outstanding||0),0);
  return{totS,goldVal:gp.val,propVal,assetVal,assets:totS+gp.val+propVal+assetVal,liabilities:loanDebt+ccDebt,netWorth:(totS+gp.val+propVal+assetVal)-(loanDebt+ccDebt),loanDebt,ccDebt};
}

  return renderBills();
}

function renderBills(){
  let items=[...S.commits];
  if(S.commitCat!=='All')items=items.filter(c=>c.category===S.commitCat);
  if(S.commitFS!=='All')items=items.filter(c=>c.status===S.commitFS);
  items.sort((a,b)=>{
    if(S.commitSort==='high')return Number(b.actualAmount||b.estAmount||0)-Number(a.actualAmount||a.estAmount||0);
    if(S.commitSort==='low')return Number(a.actualAmount||a.estAmount||0)-Number(b.actualAmount||b.estAmount||0);
    if(S.commitSort==='az')return a.name.localeCompare(b.name);
    if(S.commitSort==='za')return b.name.localeCompare(a.name);
    return(a.dueDay||99)-(b.dueDay||99);
  });
  const totAll=S.commits.reduce((s,c)=>s+Number(c.actualAmount||c.estAmount||0),0);
  const totPaid=S.commits.filter(c=>c.status==='Paid').reduce((s,c)=>s+Number(c.actualAmount||c.estAmount||0),0);
  const paidCnt=S.commits.filter(c=>c.status==='Paid').length;
  const pct=S.commits.length>0?(paidCnt/S.commits.length)*100:0;
  const cats=['All',...new Set(S.commits.map(c=>c.category))];
  return`<div class="sec">
    <div class="sec-hdr">
      <div class="sec-title">📋 <span>Bills</span></div>
      <div class="flex g6">
        <button onclick="archiveReset()" class="btn btn-ghost" style="padding:5px 9px;font-size:11px" title="Archive month">📦</button>
        <button onclick="openCommitForm()" class="btn-add">+ Add</button>
      </div>
    </div>
    <div class="card-glow mb10">
      <div class="row mb8">
        <div><div class="lbl mb4">${curMonthLabel()}</div><div class="t-xl mono c-c">${fmtRM(totAll)}</div></div>
        <div class="tar"><div class="lbl mb4">PAID</div><div class="t-xl mono c-g">${fmtRM(totPaid)}</div><div class="t-xs c-m">${paidCnt}/${S.commits.length}</div></div>
      </div>
      ${bar(pct,'var(--cyan)',8)}
      <div class="row mt6">
        <span class="t-xs c-m">Remaining: <span class="mono c-r fw6">${fmtRM(totAll-totPaid)}</span></span>
        <span class="t-xs c-m">Monthly equiv: <span class="mono c-a fw6">${fmtRM(totMonthlyCommits())}</span></span>
      </div>
    </div>
    <div class="frow">${cats.map(c=>`<button class="fbtn ${S.commitCat===c?'on':''}" onclick="setCC('${c}')">${esc(c)}</button>`).join('')}</div>
    <div class="frow">${['All','Pending','Partial','Paid'].map(s=>`<button class="fbtn ${S.commitFS===s?'on':''}" onclick="setCFS('${s}')">${s}</button>`).join('')}</div>
    <div class="srow">${sbRow([{v:'due',l:'Due Date'},{v:'high',l:'Highest'},{v:'low',l:'Lowest'},{v:'az',l:'A→Z'},{v:'za',l:'Z→A'}],S.commitSort,'setCS')}</div>
    ${items.length?items.map(billCard).join(''):empty('📋','No bills yet','Tap + Add to get started.')}
  </div>`;
}

function billCard(c){

  const CAT_CLR={Housing:'#DBEAFE',Transport:'#D1FAE5',Insurance:'#F3E8FF',Utilities:'#FEF9C3',Food:'#FEE2E2',Health:'#FCE7F3',Entertainment:'#E0E7FF',Subscription:'#ECFDF5',Personal:'#FFF7ED',Other:'#F3F4F6'};
  const badgeCls=c.status==='Paid'?'badge-paid':c.status==='Partial'?'badge-partial':ol?'badge-overdue':'badge-pending';
  const badgeTxt=c.status==='Paid'?'Paid':c.status==='Partial'?'Partial':ol?'Overdue':'Pending';
  return`<div class="card-flat" style="margin-bottom:8px">
    <div class="flex g10 mb8">
      <div class="t-dot" style="background:${CAT_CLR[c.category]||'#F3F4F6'}">${CAT_ICO[c.category]||'📋'}</div>
      <div style="flex:1">
        <div class="t-name">${esc(c.name)}</div>
        <div class="t-meta">${esc(c.category)} · ${esc(c.freq)}${c.paidTo?' · '+esc(c.paidTo):''}</div>
        ${due?`<div class="t-xs ${ol?'c-r fw6':'c-m'} mt4">${ol?'⚠️ Overdue':dl===0?'Due today':dl>0?'Due in '+dl+'d':''} ${fmtDt(due)}</div>`:''}
      </div>
      <div class="t-right">
        <div class="t-amt">${fmtRM(amt)}</div>
        ${meq?`<div class="t-xs c-m">~${fmtRM(meq)}/mo</div>`:''}
        <span class="${badgeCls}">${badgeTxt}</span>
      </div>
    </div>
    <div class="flex g4 mb6">
      ${['Pending','Partial','Paid'].map(st=>`<button onclick="setBillSt('${c.id}','${st}')" style="flex:1;padding:7px 2px;border-radius:8px;border:1.5px solid ${c.status===st?'transparent':'var(--border)'};cursor:pointer;font-size:10px;font-weight:700;font-family:'Inter',sans-serif;background:${c.status===st?(st==='Paid'?'#059669':st==='Partial'?'#7C3AED':'#D97706'):'var(--bg4)'};color:${c.status===st?'#fff':'var(--muted)'}">${st}</button>`).join('')}
    </div>
    <div class="flex g5">
      <button onclick="openUpdateAmt('${c.id}')" class="btn flex1" style="font-size:11px;background:var(--primaryLight);color:var(--primary)">💱 Update Amount</button>
      <button onclick="openCommitForm('${c.id}')" class="btn btn-ghost" style="padding:7px 10px">✏️</button>
      <button onclick="delConfirm('commit','${c.id}')" class="btn btn-danger" style="padding:7px 10px">🗑️</button>
    </div>
    ${c.notes?`<div class="t-xs c-m mt6 italic">${esc(c.notes)}</div>`:''}
  </div>`;
}

function renderHutang(){
  let items=[...S.debts];
  items.sort((a,b)=>S.debtSort==='low'?a.remaining-b.remaining:S.debtSort==='pct'?((b.original-b.remaining)/Math.max(b.original,1))-((a.original-a.remaining)/Math.max(a.original,1)):b.remaining-a.remaining);
  const totD=S.debts.reduce((s,d)=>s+Number(d.remaining||0),0);
  const totO=S.debts.reduce((s,d)=>s+Number(d.original||0),0);
  const totM=S.debts.reduce((s,d)=>s+Number(d.monthly||0),0);
  const pct=totO>0?((totO-totD)/totO)*100:0;
  return`<div class="sec">
    <div class="sec-hdr"><div class="sec-title">💳 <span>Hutang</span></div><button onclick="openDebtForm()" class="btn-add">+ Add</button></div>
    <div class="card-glow mb10">
      <div class="grid3 mb10">
        <div class="tac"><div class="lbl mb4">REMAINING</div><div class="t-md mono c-r">${fmtRM(totD)}</div></div>
        <div class="tac"><div class="lbl mb4">MONTHLY</div><div class="t-md mono c-a">${fmtRM(totM)}</div></div>
        <div class="tac"><div class="lbl mb4">PAID OFF</div><div class="t-md mono c-g">${pct.toFixed(0)}%</div></div>

}

    </div>
  </div>`;
}

function goldCard(g){

  const pnl=curVal-buyVal;const pnlPos=pnl>=0;const pnlPct=buyVal>0?(pnl/buyVal)*100:0;
  return`<div class="gold-card">
    ${g.photo?`<div style="width:100%;height:150px;border-radius:10px;overflow:hidden;margin-bottom:10px;cursor:pointer" onclick="viewPhoto('${g.id}')"><img src="${g.photo}" style="width:100%;height:100%;object-fit:cover"/></div>`:''}
    <div class="row mb8">

        <div class="t-sm fw7 mb5">${esc(g.name)}</div>
        <div class="flex g5 wrap"><span class="chip ${g.purity==='999'?'cgold':'ca'}">${g.purity}</span><span class="chip cc">${esc(g.type)}</span><span class="t-xs c-m">${fmtDt(g.buyDate)}</span></div>
      </div>
      <div class="tar"><div class="t-md mono fw7 c-gold">${fmtRM(curVal)}</div><div class="t-xs c-m">est. value</div></div>
    </div>
    <div class="grid3 mb8" style="gap:5px">
      <div class="info-box" style="flex-direction:column;margin:0"><div class="lbl">WEIGHT</div><div class="t-xs mono fw7 c-a">${Number(g.grams).toFixed(2)}g</div></div>
      <div class="info-box" style="flex-direction:column;margin:0"><div class="lbl">BUY/g</div><div class="t-xs mono fw7 c-m">${fmtRM(g.buyPricePerG)}</div></div>
      <div class="info-box" style="flex-direction:column;margin:0"><div class="lbl">COST</div><div class="t-xs mono fw7 c-m">${fmtRM(buyVal)}</div></div>
    </div>
    <div style="background:${pnlPos?'rgba(0,255,179,.06)':'rgba(255,71,87,.06)'};border:1px solid ${pnlPos?'rgba(0,255,179,.15)':'rgba(255,71,87,.15)'};border-radius:8px;padding:7px 12px;margin-bottom:10px;display:flex;justify-content:space-between">
      <span class="t-xs c-m">P&L vs cost</span>
      <span class="t-xs mono fw7 ${pnlPos?'pnl-pos':'pnl-neg'}">${pnlPos?'+':''}${fmtRM(pnl)} (${pnlPos?'+':''}${pnlPct.toFixed(1)}%)</span>
    </div>
    ${g.notes?`<div class="t-xs c-m italic mb8">${esc(g.notes)}</div>`:''}
    <div class="flex g6">
      <button onclick="openGoldForm('${g.id}')" class="btn btn-ghost flex1" style="font-size:12px">✏️</button>
      <button onclick="quickPhoto('${g.id}')" class="btn flex1" style="font-size:12px;background:rgba(255,215,0,.1);color:var(--gold);border:1px solid rgba(255,215,0,.2)">${g.photo?'🖼️':'📷'}</button>
      <button onclick="waGold('${g.id}')" class="btn flex1" style="font-size:12px;background:rgba(37,211,102,.1);color:#25D366;border:1px solid rgba(37,211,102,.2)">📲</button>
      <button onclick="delConfirm('gold','${g.id}')" class="btn btn-danger" style="padding:9px">🗑️</button>

// SAVINGS
// ══════════════════════════════════════════════
function renderSaves(){
  const PURP_ICONS={Emergency:'🛡️',Wedding:'💍',House:'🏠',Travel:'✈️',Baby:'👶',Car:'🚗',Education:'📚',Retirement:'🌇',Tech:'💻',Other:'💰'};
  let items=[...S.saves];
  items.sort((a,b)=>{
    if(S.saveSort==='pct'){const pa=a.target>0?a.current/a.target:0,pb=b.target>0?b.current/b.target:0;return pb-pa}
    if(S.saveSort==='amt')return b.target-a.target;
    return new Date(a.targetDate||'9999')-new Date(b.targetDate||'9999');
  });
  const totS=S.saves.reduce((s,i)=>s+Number(i.current||0),0);
  const totT=S.saves.reduce((s,i)=>s+Number(i.target||0),0);
  const pct=totT>0?(totS/totT)*100:0;
  return`<div class="sec">
    <div class="sec-hdr"><div class="sec-title">🏦 <span>Savings</span></div><button onclick="openSaveForm()" class="btn-add">+ Add</button></div>
    <div class="card-glow mb10">
      <div class="grid2 mb8"><div><div class="lbl mb4">TOTAL SAVED</div><div class="t-xl mono c-g">${fmtRM(totS)}</div></div><div class="tar"><div class="lbl mb4">TARGET</div><div class="t-xl mono c-m">${fmtRM(totT)}</div></div></div>
      ${bar(pct,'var(--green)',8)}
      <div class="t-xs c-g mono mt6">${pct.toFixed(0)}% of total target reached</div>
    </div>
    <div class="srow">${sbRow([{v:'pct',l:'Progress'},{v:'date',l:'Target Date'},{v:'amt',l:'Biggest'}],S.saveSort,'setSS')}</div>
    ${items.map(s=>{
      const p=s.target>0?(s.current/s.target)*100:0;
      const left=Math.max(0,s.target-s.current);
      const mos=s.monthly>0?Math.ceil(left/s.monthly):null;
      const col=p>=100?'var(--green)':p>=50?'var(--cyan)':'var(--purple)';
      const prioCol={High:'cr',Medium:'ca',Low:'cc'}[s.priority]||'cc';
      return`<div class="card-glow mb10" style="border-color:${col}25">
        <div class="row mb10">
          <div><div class="flex g8 mb5"><span style="font-size:20px">${PURP_ICONS[s.purpose]||'💰'}</span><span class="t-md fw7">${esc(s.name)}</span></div>
          <div class="flex g5"><span class="chip cp">${esc(s.purpose)}</span><span class="chip ${prioCol}">${s.priority}</span>${p>=100?'<span class="chip cg">✓ Done!</span>':''}</div></div>
          <div class="tar"><div class="t-lg mono c-g fw7">${fmtRM(s.current)}</div><div class="t-xs c-m">of ${fmtRM(s.target)}</div></div>
        </div>
        ${bar(p,col,10)}
        <div class="row mt6 mb10">
          <span class="t-xs c-m">${p.toFixed(0)}% reached</span>
          ${s.targetDate?`<span class="t-xs mono" style="color:${col}">by ${fmtDt(s.targetDate)}</span>`:''}
          ${mos&&p<100?`<span class="t-xs c-m">~${mos}mo left</span>`:''}
        </div>
        <div class="flex g8"><button onclick="openSaveForm('${s.id}')" class="btn btn-ghost flex1" style="font-size:12px">✏️ Edit</button><button onclick="delConfirm('save','${s.id}')" class="btn btn-danger flex1" style="font-size:12px">🗑️</button></div>
      </div>`;
    }).join('')}
    ${!items.length?empty('🏦','No goals','Start saving towards something.'):''}
  </div>`;
}

function renderLife(){
  const sub=S.sub||'property';
  if(sub==='property') return renderProperty();
  if(sub==='insurance') return renderInsurance();
  if(sub==='vehicle') return renderVehicle();
  if(sub==='subs') return renderSubs();
  if(sub==='docs') return renderDocs();
  if(sub==='dates') return renderDates();
  if(sub==='wishes') return renderWishes();
  if(sub==='tax') return renderTax();
  return renderProperty();
}

// ── TASKS ──────────────────────────────────────
function renderTasks(){
  let items=[...(S.tasks||[])];
  if(S.taskFS!=='All') items=items.filter(i=>i.status===S.taskFS);
  if(S.taskQ) items=items.filter(i=>i.name.toLowerCase().includes(S.taskQ.toLowerCase()));
  items.sort((a,b)=>{
    if(S.taskSort==='urgency'){const pp=['High','Medium','Low'];const pd=pp.indexOf(a.priority)-pp.indexOf(b.priority);return pd!==0?pd:new Date(a.dueDate||'9999')-new Date(b.dueDate||'9999')}
    if(S.taskSort==='energy') return a.energy.localeCompare(b.energy);
    return new Date(a.dueDate||'9999')-new Date(b.dueDate||'9999');
  });
  const done=(S.tasks||[]).filter(t=>t.status==='Done').length;
  const tot=(S.tasks||[]).length;
  const pct=tot>0?(done/tot)*100:0;
  return`<div class="sec">
    <div class="sec-hdr"><div class="sec-title">🎯 <span>Tasks</span></div><button onclick="openTaskForm()" class="btn-add">+ Add</button></div>
    <div class="card-glow mb10">
      <div class="row mb8"><span class="t-sm c-m">${done}/${tot} done</span><span class="t-sm mono c-c fw7">${pct.toFixed(0)}%</span></div>
      ${bar(pct,'var(--cyan)',8)}
      <div class="flex g6 mt10 wrap">
        <span class="ebadge e-deep">🧠 Deep Work</span>
        <span class="ebadge e-quick">⚡ Quick Win</span>
        <span class="ebadge e-admin">📋 Admin</span>

      </div>
    </div>
    <input class="finp mb10" placeholder="🔍 Search tasks..." value="${esc(S.taskQ||'')}" oninput="S.taskQ=this.value;rp()" style="display:block"/>
    <div class="frow">${['All','Pending','In Progress','Done'].map(s=>`<button class="fbtn ${(S.taskFS||'All')===s?'on':''}" onclick="setTFS('${s}')">${s}</button>`).join('')}</div>
    <div class="srow">${sbRow([{v:'urgency',l:'Urgency'},{v:'due',l:'Due Date'},{v:'energy',l:'Energy'}],S.taskSort||'urgency','setTS')}</div>

  const EBADGE={deep:'e-deep',quick:'e-quick',admin:'e-admin',call:'e-call'};
  return`<div class="card-flat ${done?'op7':''}" style="border-left:2px solid ${bc}">
    <div class="row mb8">
      <div style="flex:1;padding-right:8px">
        <div class="t-sm fw6 mb5 ${done?'strike':''}">${esc(t.name)}</div>
        <div class="flex g4 wrap">
          <span class="ebadge ${EBADGE[t.energy]||'e-admin'}">${{deep:'🧠 Deep',quick:'⚡ Quick',admin:'📋 Admin',call:'📞 Call'}[t.energy]||t.energy}</span>
          <span class="chip ${t.priority==='High'?'cr':t.priority==='Medium'?'ca':'cc'}">${t.priority}</span>
          ${t.dueDate?`<span class="t-xs ${ol?'c-r':'c-m'}">${ol?'⚠️ Overdue':dl===0?'Today':dl>0?dl+'d left':''}</span>`:''}
        </div>
      </div>
      <div class="flex g4">
        <button onclick="openTaskForm('${t.id}')" class="btn btn-ghost" style="padding:5px 8px;font-size:11px">✏️</button>
        <button onclick="delConfirm('task','${t.id}')" class="btn btn-danger" style="padding:5px 8px;font-size:11px">🗑️</button>
      </div>
    </div>
    ${t.notes?`<div class="t-xs c-m mb8 italic">${esc(t.notes)}</div>`:''}
    <div class="flex g4">
      ${['Pending','In Progress','Done'].map(st=>`<button onclick="setTaskSt('${t.id}','${st}')" style="flex:1;padding:7px 2px;border-radius:8px;border:1px solid ${t.status===st?'transparent':'var(--border)'};cursor:pointer;font-size:10px;font-weight:700;font-family:'Inter',sans-serif;background:${t.status===st?(st==='Done'?'var(--green)':st==='In Progress'?'var(--purple)':'var(--amber)'):'var(--bg4)'};color:${t.status===st?'#000':'var(--muted)'};white-space:nowrap">${st}</button>`).join('')}

// ── HABITS ─────────────────────────────────────
function renderHabits(){
  const habits=S.habits||[];
  const today=todayStr();
  const todayH=habits.filter(h=>h.log&&h.log[today]).length;
  const bestS=habits.length?Math.max(...habits.map(h=>h.streak||0)):0;
  const totalStreak=habits.reduce((s,h)=>s+(h.streak||0),0);
  const avgStreak=habits.length?Math.round(totalStreak/habits.length):0;
  return`<div class="sec">
    <div class="sec-hdr"><div class="sec-title">🔥 <span>Habits</span></div><button onclick="openHabitForm()" class="btn-add">+ New</button></div>
    <div class="grid2 mb10">
      <div class="qstat"><div class="lbl mb4">TODAY</div><div class="t-xl mono c-g">${todayH}/${habits.length}</div><div class="t-xs c-m mt4">habits done</div></div>
      <div class="qstat"><div class="lbl mb4">BEST STREAK</div><div class="t-xl mono c-a">${bestS}d 🔥</div><div class="t-xs c-m mt4">avg ${avgStreak}d</div></div>
    </div>
    ${habits.map(h=>{
      const done=!!(h.log&&h.log[today]);
      const days=[];for(let i=20;i>=0;i--){const d=new Date(Date.now()-i*86400000).toISOString().slice(0,10);days.push({d,done:!!(h.log&&h.log[d]),today:d===today})}
      const weekDone=days.slice(-7).filter(d=>d.done).length;
      return`<div class="card-glow mb10">
        <div class="row mb10">
          <div class="flex g10">
            <span style="font-size:26px">${h.icon||'⭐'}</span>
            <div>
              <div class="t-sm fw6 mb4">${esc(h.name)}</div>
              <div class="flex g5 wrap">
                <span class="chip ca">🔥 ${h.streak||0}d</span>
                <span class="chip cc">${weekDone}/${h.target||7} this week</span>
                ${done?'<span class="chip cg">✓ Done</span>':''}
              </div>
            </div>
          </div>
          <div class="flex g4">
            <button onclick="toggleHabit('${h.id}')" style="background:${done?'var(--green)':'var(--bg4)'};border:1px solid ${done?'var(--green)':'var(--border2)'};border-radius:10px;padding:9px 13px;cursor:pointer;font-size:15px;font-weight:700;color:${done?'#000':'var(--muted)'};transition:all .2s">${done?'✓':'○'}</button>
            <button onclick="openHabitForm('${h.id}')" class="btn btn-ghost" style="padding:8px;font-size:12px">✏️</button>
            <button onclick="delConfirm('habit','${h.id}')" class="btn btn-danger" style="padding:8px;font-size:12px">🗑️</button>
          </div>
        </div>
        <div class="t-xs c-m mb5">Last 21 days</div>
        <div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:8px">${days.map(day=>`<div style="width:16px;height:16px;border-radius:4px;background:${day.done?'var(--green)':'var(--bg4)'};border:${day.today?'1.5px solid var(--cyan)':'none'};box-shadow:${day.done?'0 0 5px rgba(0,255,179,.35)':'none'}" title="${day.d}"></div>`).join('')}</div>
        ${bar(weekDone/(h.target||7)*100,'var(--green)',4)}
      </div>`;
    }).join('')}

// ── HEALTH ─────────────────────────────────────
function renderHealth(){
  const today=todayStr();
  const log=S.healthLog||[];
  const todayLog=log.find(l=>l.date===today)||{};
  const last7=log.slice(-7);
  const avgSleep=last7.length?last7.reduce((s,l)=>s+Number(l.sleep||0),0)/last7.length:0;
  const avgWater=last7.length?last7.reduce((s,l)=>s+Number(l.water||0),0)/last7.length:0;
  const latestW=log.filter(l=>l.weight).slice(-1)[0];
  const goals=S.healthGoals||{weightTarget:60,waterTarget:8,sleepTarget:8,heightCm:160};
  const bmi=latestW&&goals.heightCm?Number((latestW.weight/Math.pow(goals.heightCm/100,2)).toFixed(1)):null;
  const bmiLabel=bmi?bmi<18.5?'Underweight':bmi<25?'Normal ✓':bmi<30?'Overweight':'Obese':'–';
  const bmiCol=bmi?bmi<18.5?'var(--cyan)':bmi<25?'var(--green)':bmi<30?'var(--amber)':'var(--red)':'var(--muted)';

function renderArchive(){
  if(!S.archive.length)return`<div class="sec">${empty('📦','No archives yet','Tap 📦 in Bills at month end to archive.')}</div>`;
  const months=S.archive;const sel=S.archiveMonth||months[0].month;
  const snap=months.find(m=>m.month===sel)||months[0];
  return`<div class="sec">
    <div class="sec-title mb10">📦 <span>Archive</span></div>
    <div class="srow mb12">${months.map(m=>`<button class="sbtn ${sel===m.month?'on':''}" onclick="S.archiveMonth='${m.month}';rp()">${m.label}</button>`).join('')}</div>
    <div class="card-glow mb10">
      <div class="lbl mb8">${esc(snap.label)}</div>
      ${[

function archiveReset(){
  if(!confirm('Archive '+curMonthLabel()+' and reset bill statuses for next month?'))return;
  const key=curMonthKey();
  if(!S.archive.find(a=>a.month===key)){
    const nw=calcNetWorth();
    S.archive=[{
      month:key,label:curMonthLabel(),
      commits:S.commits.map(c=>({name:c.name,category:c.category,freq:c.freq,amount:Number(c.actualAmount||c.estAmount||0),status:c.status})),
      totalPaid:S.commits.filter(c=>c.status==='Paid').reduce((s,c)=>s+Number(c.actualAmount||c.estAmount||0),0),
      totalCommits:S.commits.reduce((s,c)=>s+Number(c.actualAmount||c.estAmount||0),0),
      savings:S.saves.reduce((s,v)=>s+Number(v.current||0),0),
      debt:S.debts.reduce((s,d)=>s+Number(d.remaining||0),0),
      netWorth:nw.netWorth,savedOn:todayStr()
    },...S.archive].slice(0,24);
    sv('archive');
  }
  S.commits=S.commits.map(c=>c.freq!=='One-time'?{...c,status:'Pending',actualAmount:'',lastUpdated:''}:c);
  sv('commits');alert('Done! Bills reset for new month.');rp();
}

function toggleHabit(id){
  const today=todayStr();
  if(!S.habits)return;
  S.habits=S.habits.map(h=>{
    if(h.id!==id)return h;
    const log={...(h.log||{})};const nowDone=!log[today];
    if(nowDone){log[today]=true}else{delete log[today]}
    let streak=0;let d=new Date();
    while(true){const ds=d.toISOString().slice(0,10);if(log[ds]){streak++;d=new Date(d-86400000)}else break}
    return{...h,log,streak};
  });
  sv('habits');rp();
}

function saveHealthLog(){
  const today=todayStr();
  const ht=Number(document.getElementById('hl-ht').value||0);
  const entry={date:today};
  const wt=Number(document.getElementById('hl-wt').value||0);if(wt)entry.weight=wt;
  const bp=document.getElementById('hl-bp').value;if(bp)entry.bp=bp;
  const wa=Number(document.getElementById('hl-wa').value||0);if(wa)entry.water=wa;
  const sl=Number(document.getElementById('hl-sl').value||0);if(sl)entry.sleep=sl;
  if(ht)entry.height=ht;
  const md=document.getElementById('hl-md').value;if(md)entry.mood=md;
  const nt=document.getElementById('hl-nt').value;if(nt)entry.notes=nt;
  if(!S.healthLog)S.healthLog=[];
  S.healthLog=[...S.healthLog.filter(l=>l.date!==today),entry].slice(-365);
  // Update height in goals
  if(ht&&S.healthGoals)S.healthGoals={...S.healthGoals,heightCm:ht};
  sv('healthLog');if(ht)sv('healthGoals');closeModal();rp();
}

function openScreeningForm(id){
  const screenings=S.screenings||[];
  const it=id?screenings.find(i=>i.id===id):{name:'',lastDate:'',intervalMonths:12,notes:''};
  openModal(id?'Edit Screening':'Add Screening',`
    <div class="fg"><label class="flbl">Screening Name</label><input class="finp" id="sc-n" value="${esc(it.name)}" placeholder="e.g. Annual Medical Checkup, Dental"/></div>
    <div class="fg"><label class="flbl">Last Done Date</label><input class="finp" id="sc-ld" type="date" value="${it.lastDate||''}"/></div>
    <div class="fg"><label class="flbl">Repeat Every (months)</label><input class="finp" id="sc-iv" type="number" value="${it.intervalMonths||12}" placeholder="12 = yearly, 6 = every 6 months"/></div>

function saveScreening(id){
  const n=document.getElementById('sc-n').value.trim();if(!n){alert('Enter screening name.');return}
  const it={id:id||uid(),name:n,lastDate:document.getElementById('sc-ld').value,intervalMonths:Number(document.getElementById('sc-iv').value||12),notes:document.getElementById('sc-nt').value};
  if(!S.screenings)S.screenings=[];
  if(id){S.screenings=S.screenings.map(i=>i.id===id?it:i)}else{S.screenings=[it,...S.screenings]}
  sv('screenings');closeModal();rp();
}

function delConfirm(type,id){
  openModal('Delete?',`<p style="color:var(--muted);margin-bottom:16px">This cannot be undone.</p>
  <div style="display:flex;gap:10px"><button class="btn btn-danger flex1" onclick="doDelete('${type}','${id}')">Yes, Delete</button><button class="btn btn-ghost flex1" onclick="closeModal()">Cancel</button></div>`);

function doDelete(type,id){
  const MAP={commit:'commits',debt:'debts',gold:'gold',card:'cards',inst:'installments',save:'saves',prop:'properties',asset:'assets',ins:'insurances',sub:'subs',vehicle:'vehicles',date:'dates',doc:'docs',wish:'wishes',tax:'taxClaims',task:'tasks',habit:'habits',goal:'goalsList',screening:'screenings'};
  const k=MAP[type];if(k){S[k]=S[k].filter(i=>i.id!==id);sv(k)}closeModal();rp();
}

// BACKUP / RESTORE / RESET
// ══════════════════════════════════════════════
function exportJSON(){
  const keys=['commits','archive','debts','cards','installments','gold','goldPrices','goldGoals','saves','properties','assets','insurances','subs','vehicles','dates','docs','wishes','taxClaims','tasks','habits','goalsList','healthLog','healthGoals','screenings','name'];
  const data={exportedAt:new Date().toISOString(),version:'LifeHub-v2'};
  keys.forEach(k=>{try{data[k]=JSON.parse(localStorage.getItem('lhv2_'+k)||'null')}catch(e){}});
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='LifeHub_Backup_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(url);
}
function importJSON(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!data.version||!data.version.includes('LifeHub')){alert('Invalid LifeHub backup file.');return}
      if(!confirm('Restore backup from '+new Date(data.exportedAt).toLocaleDateString('en-MY')+'? This will overwrite current data.'))return;
      const keys=['commits','archive','debts','cards','installments','gold','goldPrices','goldGoals','saves','properties','assets','insurances','subs','vehicles','dates','docs','wishes','taxClaims','tasks','habits','goalsList','healthLog','healthGoals','screenings','name'];
      keys.forEach(k=>{if(data[k]!==null&&data[k]!==undefined){localStorage.setItem('lhv2_'+k,JSON.stringify(data[k]))}});
      alert('Backup restored! Reloading app...');location.reload();
    }catch(err){alert('Failed to restore backup: '+err.message);}
  };
  reader.readAsText(file);
}
function resetAllData(){
  if(!confirm('Reset ALL data? This cannot be undone.'))return;
  if(!confirm('Are you absolutely sure? All your data will be deleted.'))return;
  const keys=['commits','archive','debts','cards','installments','gold','goldPrices','goldGoals','saves','properties','assets','insurances','subs','vehicles','dates','docs','wishes','taxClaims','tasks','habits','goalsList','healthLog','healthGoals','screenings','name','theme'];
  keys.forEach(k=>localStorage.removeItem('lhv2_'+k));
  alert('All data cleared. Reloading...');location.reload();
}

// THEME

function applyTheme(theme){
  if(theme==='dark'){
    document.body.classList.add('dark');
    const btn=document.getElementById('theme-btn');
    if(btn)btn.textContent='☀️';
  } else {
    document.body.classList.remove('dark');
    const btn=document.getElementById('theme-btn');
    if(btn)btn.textContent='🌙';
  }
}
function toggleTheme(){
  const isDark=document.body.classList.contains('dark');
  const next=isDark?'light':'dark';
  LS.set('theme',next);
  applyTheme(next);
}

// ── EYE TOGGLE ──────────────────────────────
function toggleBalance(){
  _balHidden=!_balHidden;
  document.querySelectorAll('.bal-hide').forEach(el=>{
    el.classList.toggle('blurred',_balHidden);
    el.classList.toggle('blurred-sm',false);
  });
  document.querySelectorAll('.bal-hide-sm').forEach(el=>{
    el.classList.toggle('blurred-sm',_balHidden);
  });
  const btn=document.getElementById('hero-eye');
  if(btn)btn.textContent=_balHidden?'🙈':'👁️';
}
